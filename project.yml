# NOTE: This file is only usable if you have full Xcode.app installed and have
# `brew install xcodegen`. On CLT-only setups use `Scripts/build.sh` instead.
#
# The CLT-only build path does NOT depend on GRDB. If you later install Xcode
# and want to use SPM, add GRDB back in the `packages:` section and swap the
# SQLite backend if desired.

name: Clipboard
options:
  minimumXcodeGenVersion: "2.38.0"
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  bundleIdPrefix: com.local

settings:
  base:
    SWIFT_VERSION: "5.8"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    PRODUCT_BUNDLE_IDENTIFIER: com.local.clipboard
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    COMBINE_HIDPI_IMAGES: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    OTHER_LDFLAGS: "-lsqlite3"

targets:
  Clipboard:
    type: application
    platform: macOS
    sources:
      - path: Sources/Clipboard
        excludes:
          - "**/*.md"
          - "Resources/**"
      - path: Sources/Clipboard/Resources
        buildPhase: resources
    info:
      path: Sources/Clipboard/App/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        CFBundleName: Clipboard
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSAppleEventsUsageDescription: "Clipboard uses Apple Events to paste content back to the previously active application."
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
    entitlements:
      path: Sources/Clipboard/App/Clipboard.entitlements
    settings:
      base:
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        CODE_SIGN_ENTITLEMENTS: Sources/Clipboard/App/Clipboard.entitlements
        GENERATE_INFOPLIST_FILE: NO
